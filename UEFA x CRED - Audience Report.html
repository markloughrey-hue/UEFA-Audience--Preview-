document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"1cc996bd-2713-40bb-9a2d-fd1681c9aec3\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"19e630b4-7379-462c-ba6e-7703c73a89fd\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"1bdd2549-f9ad-47da-a978-0a3afdcc72fb\"><\u002Fscript>\n\n<style>\n  /* Local Geist (matches CRED design system) with web-font fallback */\n  @font-face {\n    font-family: \"Geist\";\n    src: url(\"f84a8ca4-a3b8-40d5-b311-fd7c1e30970f\") format(\"truetype-variations\");\n    font-weight: 100 900;\n    font-style: normal;\n    font-display: swap;\n  }\n  @font-face {\n    font-family: \"Geist Mono\";\n    src: url(\"0e749eee-30db-4755-a1fb-a0bfea68cd63\") format(\"truetype-variations\");\n    font-weight: 100 900;\n    font-style: normal;\n    font-display: swap;\n  }\n\n  :root {\n    /* CRED tokens */\n    --emerald-50:  #ECFDF5;\n    --emerald-100: #D1FAE5;\n    --emerald-200: #A7F3D0;\n    --emerald-300: #6EE7B7;\n    --emerald-400: #34D399;\n    --emerald-500: #10B981;\n    --emerald-600: #059669;\n    --emerald-700: #047857;\n    --emerald-800: #065F46;\n    --emerald-900: #064E3B;\n\n    --neutral-50:  #FAFAFA;\n    --neutral-100: #F5F5F5;\n    --neutral-200: #E5E5E5;\n    --neutral-300: #D4D4D4;\n    --neutral-400: #A3A3A3;\n    --neutral-500: #737373;\n    --neutral-600: #525252;\n    --neutral-700: #404040;\n    --neutral-800: #262626;\n    --neutral-900: #171717;\n    --neutral-950: #0A0A0A;\n\n    --bg:         #F5F5F5;\n    --paper:      #FFFFFF;\n    --ink:        #0A0A0A;\n    --ink-2:      #262626;\n    --muted:      #737373;\n    --faint:      #A3A3A3;\n    --line:       #E5E5E5;\n    --line-soft:  #F0F0F0;\n    --line-strong:#D4D4D4;\n\n    --font-sans:  \"Geist\", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n    --font-mono:  \"Geist Mono\", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body { background: var(--bg); }\n  body {\n    font-family: var(--font-sans);\n    color: var(--ink);\n    line-height: 1.5;\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n    font-size: 13.5px;\n    font-feature-settings: \"ss01\", \"cv11\";\n    padding: 28px 16px 56px;\n  }\n\n  /* ============================================================\n     PAGE SHELL — looks like a CRED workspace\n     ============================================================ */\n  .shell {\n    max-width: 1180px;\n    margin: 0 auto;\n    background: var(--paper);\n    border-radius: 14px;\n    overflow: hidden;\n    box-shadow:\n      0 1px 1px rgba(0,0,0,0.04),\n      0 8px 24px -8px rgba(10,10,10,0.08),\n      0 24px 60px -24px rgba(10,10,10,0.16);\n    border: 1px solid var(--line);\n  }\n\n  /* — top platform bar (CRED app chrome) — */\n  .platform-bar {\n    display: flex;\n    align-items: center;\n    gap: 24px;\n    padding: 10px 20px;\n    background: var(--neutral-950);\n    color: #fff;\n    font-size: 12.5px;\n  }\n  .pb-brand {\n    display: flex; align-items: center; gap: 9px;\n    font-weight: 600; letter-spacing: -0.01em;\n  }\n  .pb-brand .mark {\n    width: 22px; height: 22px;\n    background: var(--emerald-500);\n    border-radius: 5px;\n    display: grid; place-items: center;\n    font-family: var(--font-sans);\n    font-weight: 700;\n    font-size: 11px;\n    color: #051A12;\n    letter-spacing: -0.02em;\n  }\n  .pb-brand .name { font-size: 13.5px; }\n  .pb-brand .div { width: 1px; height: 16px; background: rgba(255,255,255,0.12); margin: 0 4px; }\n  .pb-brand .tag {\n    font-size: 10.5px; font-weight: 500;\n    color: rgba(255,255,255,0.55);\n    text-transform: uppercase; letter-spacing: 0.08em;\n  }\n  .pb-nav { display: flex; align-items: center; gap: 2px; margin-left: 8px; }\n  .pb-nav a {\n    color: rgba(255,255,255,0.65);\n    padding: 6px 10px;\n    border-radius: 6px;\n    text-decoration: none;\n    font-size: 12.5px;\n    font-weight: 500;\n  }\n  .pb-nav a:hover { color: #fff; background: rgba(255,255,255,0.06); }\n  .pb-nav a.active {\n    color: #fff;\n    background: rgba(255,255,255,0.08);\n  }\n  .pb-right { margin-left: auto; display: flex; align-items: center; gap: 14px; color: rgba(255,255,255,0.55); }\n  .pb-search {\n    display: flex; align-items: center; gap: 8px;\n    background: rgba(255,255,255,0.06);\n    border: 1px solid rgba(255,255,255,0.08);\n    padding: 5px 10px;\n    border-radius: 7px;\n    font-size: 12px;\n    color: rgba(255,255,255,0.5);\n    min-width: 220px;\n  }\n  .pb-search kbd {\n    margin-left: auto;\n    font-family: var(--font-mono);\n    font-size: 10px;\n    padding: 1px 5px;\n    background: rgba(255,255,255,0.06);\n    border: 1px solid rgba(255,255,255,0.08);\n    border-radius: 3px;\n    color: rgba(255,255,255,0.45);\n  }\n  .pb-avatar {\n    width: 24px; height: 24px;\n    border-radius: 50%;\n    background: linear-gradient(135deg, #34D399 0%, #047857 100%);\n    color: #fff;\n    display: grid; place-items: center;\n    font-weight: 600; font-size: 10.5px;\n    letter-spacing: -0.01em;\n  }\n\n  /* — workspace sub-bar (breadcrumb + actions) — */\n  .workspace-bar {\n    display: flex;\n    align-items: center;\n    gap: 16px;\n    padding: 12px 24px;\n    background: var(--paper);\n    border-bottom: 1px solid var(--line);\n    font-size: 12.5px;\n  }\n  .crumbs { display: flex; align-items: center; gap: 8px; color: var(--muted); }\n  .crumbs .sep { color: var(--faint); }\n  .crumbs .here { color: var(--ink); font-weight: 600; }\n  .ws-tabs { margin-left: 16px; display: flex; gap: 2px; }\n  .ws-tabs button {\n    background: transparent; border: none; cursor: pointer;\n    font-family: inherit; font-size: 12.5px; color: var(--muted);\n    padding: 6px 10px; border-radius: 6px;\n    display: inline-flex; align-items: center; gap: 6px;\n  }\n  .ws-tabs button.active { color: var(--ink); background: var(--neutral-100); font-weight: 600; }\n  .ws-tabs button:hover:not(.active) { color: var(--ink); }\n  .ws-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }\n  .btn {\n    border: 1px solid var(--line-strong);\n    background: var(--paper);\n    color: var(--ink);\n    font-family: inherit; font-size: 12.5px; font-weight: 500;\n    padding: 6px 12px; border-radius: 7px;\n    cursor: pointer;\n    display: inline-flex; align-items: center; gap: 6px;\n    transition: background 120ms, border-color 120ms;\n  }\n  .btn:hover { background: var(--neutral-50); border-color: var(--neutral-400); }\n  .btn-primary {\n    background: var(--neutral-950);\n    color: #fff;\n    border-color: var(--neutral-950);\n  }\n  .btn-primary:hover { background: var(--neutral-800); border-color: var(--neutral-800); }\n  .btn svg { width: 13px; height: 13px; }\n  .status-pill {\n    display: inline-flex; align-items: center; gap: 6px;\n    font-size: 11px; font-weight: 500; color: var(--muted);\n    padding: 3px 9px 3px 7px;\n    border: 1px solid var(--line);\n    background: var(--neutral-50);\n    border-radius: 999px;\n  }\n  .status-pill::before {\n    content: \"\"; width: 6px; height: 6px; border-radius: 50%;\n    background: var(--emerald-500);\n    box-shadow: 0 0 0 3px var(--emerald-100);\n  }\n\n  /* ============================================================\n     CO-BRAND HERO — dark, dramatic, with platform screenshot\n     ============================================================ */\n  .hero {\n    position: relative;\n    background:\n      radial-gradient(ellipse 90% 60% at -10% 50%, rgba(16,185,129,0.14), transparent 55%),\n      radial-gradient(ellipse 80% 80% at 110% 110%, rgba(16,185,129,0.10), transparent 60%),\n      linear-gradient(180deg, #061B14 0%, #07150F 100%);\n    color: #fff;\n    overflow: hidden;\n    isolation: isolate;\n  }\n  .hero::before {\n    /* faint topographic / dot pattern */\n    content: \"\";\n    position: absolute; inset: 0;\n    background-image: radial-gradient(rgba(255,255,255,0.045) 1px, transparent 1px);\n    background-size: 22px 22px;\n    mask-image: linear-gradient(120deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.15) 60%, transparent 100%);\n    -webkit-mask-image: linear-gradient(120deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.15) 60%, transparent 100%);\n    pointer-events: none;\n    z-index: 0;\n  }\n  .hero-grid {\n    position: relative;\n    z-index: 1;\n    display: grid;\n    grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);\n    gap: 0;\n    align-items: stretch;\n  }\n  .hero-left {\n    padding: 56px 40px 52px 44px;\n    display: flex; flex-direction: column;\n  }\n  .hero-right {\n    position: relative;\n    overflow: hidden;\n    min-height: 460px;\n  }\n  .hero-badge {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 6px 14px 6px 12px;\n    border: 1px solid rgba(16,185,129,0.35);\n    background: rgba(16,185,129,0.08);\n    border-radius: 999px;\n    color: var(--emerald-400);\n    font-size: 11px; font-weight: 600;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    align-self: flex-start;\n    margin-bottom: 22px;\n  }\n  .hero-badge::before {\n    content: \"\"; width: 6px; height: 6px;\n    border-radius: 50%; background: var(--emerald-400);\n    box-shadow: 0 0 0 3px rgba(52,211,153,0.18);\n  }\n  .hero-url {\n    color: var(--emerald-400);\n    font-size: 13px; font-weight: 500;\n    margin-bottom: 16px;\n    letter-spacing: -0.005em;\n  }\n  .hero h1 {\n    font-size: clamp(34px, 4.2vw, 54px);\n    font-weight: 700;\n    letter-spacing: -0.035em;\n    line-height: 1.02;\n    color: #fff;\n    margin-bottom: 20px;\n    text-wrap: balance;\n  }\n  .hero h1 .sep {\n    color: rgba(255,255,255,0.32);\n    font-weight: 500;\n    margin: 0 4px;\n  }\n  .hero h1 .hi {\n    color: var(--emerald-400);\n    font-weight: 700;\n  }\n  .hero h1 .sub {\n    display: block;\n    color: #fff;\n    font-size: 0.78em;\n    font-weight: 600;\n    letter-spacing: -0.028em;\n    margin-top: 8px;\n  }\n  .hero .lede {\n    color: rgba(255,255,255,0.65);\n    font-size: 15px; font-weight: 400;\n    max-width: 560px;\n    line-height: 1.55;\n    margin-bottom: 28px;\n  }\n  .hero .lede b { color: #fff; font-weight: 500; }\n  .hero-pills {\n    display: flex; flex-wrap: wrap; gap: 8px;\n    margin-bottom: 28px;\n  }\n  .hero-pills .pill {\n    padding: 8px 14px;\n    background: rgba(255,255,255,0.05);\n    border: 1px solid rgba(255,255,255,0.10);\n    border-radius: 999px;\n    font-size: 12.5px;\n    font-weight: 500;\n    color: rgba(255,255,255,0.82);\n    display: inline-flex; align-items: center; gap: 7px;\n  }\n  .hero-pills .pill b { color: #fff; font-weight: 600; font-family: var(--font-mono); font-size: 12px; }\n  .hero-meta {\n    display: grid;\n    grid-template-columns: repeat(2, max-content);\n    gap: 14px 36px;\n    padding-top: 22px;\n    margin-top: auto;\n    border-top: 1px solid rgba(255,255,255,0.08);\n    font-size: 12px;\n  }\n  .hero-meta .label {\n    text-transform: uppercase; letter-spacing: 0.1em;\n    color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 600;\n    margin-bottom: 4px;\n  }\n  .hero-meta .val {\n    color: #fff; font-weight: 500;\n    font-size: 13px;\n  }\n\n  /* — tilted platform screenshot — */\n  .platform-shot {\n    position: absolute;\n    top: 38px;\n    left: 4%;\n    right: - \u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td>Telecoms / 5G<\u002Ftd><td class=\"num-bold\">38%<\u002Ftd><td class=\"num\">21%<\u002Ftd><td class=\"num\"><span class=\"index-pill\">1.8×<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td>Travel / airlines<\u002Ftd><td class=\"num-bold\">34%<\u002Ftd><td class=\"num\">14%<\u002Ftd><td class=\"num\"><span class=\"index-pill\">2.4×<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td>Food delivery<\u002Ftd><td class=\"num-bold\">32%<\u002Ftd><td class=\"num\">18%<\u002Ftd><td class=\"num\"><span class=\"index-pill\">1.8×<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td>Streaming / OTT<\u002Ftd><td class=\"num-bold\">29%<\u002Ftd><td class=\"num\">15%<\u002Ftd><td class=\"num\"><span class=\"index-pill\">1.9×<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td>Premium automotive<\u002Ftd><td class=\"num-bold\">17%<\u002Ftd><td class=\"num\">6%<\u002Ftd><td class=\"num\"><span class=\"index-pill\">2.8×<\u002Fspan><\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <!-- Next steps -->\n    <div class=\"card span-12\">\n      <div class=\"card-head\">\n        <div class=\"card-head-text\">\n          <div class=\"card-eyebrow\">Next<\u002Fdiv>\n          <div class=\"card-title\">If this is useful, here's how we'd take it forward<\u002Fdiv>\n          <div class=\"card-sub\">Sized around UEFA's commercial sales cycle and member-association reporting cadence<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <ol class=\"next-steps\">\n        <li><strong>Internal regroup.<\u002Fstrong> Vincent to regroup with the UEFA Data &amp; Insights team and gauge interest within the commercial, sponsorship and member-association functions.<\u002Fli>\n        <li><strong>Sample shared.<\u002Fstrong> If of interest, UEFA shares a sample slice of the registered fan base with CRED — email, favourite club and country is sufficient for the match-back.<\u002Fli>\n        <li><strong>Populated report.<\u002Fstrong> CRED enriches the sample and pulls the output into a populated report — same shape as this preview, but with real UEFA numbers — segmented by competition, MA and inventory tier.<\u002Fli>\n        <li><strong>Productionise.<\u002Fstrong> If the populated report is useful, we scope productionising against the full 12M base, with quarterly refresh and direct integration into UEFA's commercial &amp; partner-activation workflows.<\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ============ FOOTER ============ -->\n  <div class=\"dash-footer\">\n    <div class=\"left\">\n      <b>CRED<\u002Fb>\n      <span>·<\u002Fspan>\n      <span>The Predictive Intelligence Platform<\u002Fspan>\n      <span class=\"badges\">\n        <span class=\"badge\">SOC 2<\u002Fspan>\n        <span class=\"badge\">GDPR<\u002Fspan>\n        <span class=\"badge\">v1.0<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fdiv>\n    <div>Mark Loughrey · <a href=\"mailto:mark.loughrey@credinvestments.com\">mark.loughrey@credinvestments.com<\u002Fa><\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\nChart.defaults.font.family = \"'Geist', ui-sans-serif, system-ui, sans-serif\";\nChart.defaults.font.size = 11;\nChart.defaults.color = '#737373';\nChart.defaults.borderColor = '#F0F0F0';\n\nconst EMERALD       = '#10B981';\nconst EMERALD_DARK  = '#047857';\nconst EMERALD_DEEP  = '#065F46';\nconst EMERALD_MID   = '#34D399';\nconst EMERALD_LIGHT = '#A7F3D0';\nconst EMERALD_PALE  = '#D1FAE5';\nconst NEUTRAL_300   = '#D4D4D4';\nconst NEUTRAL_200   = '#E5E5E5';\n\nconst tooltipBase = {\n  backgroundColor: '#0A0A0A',\n  titleColor: '#fff',\n  bodyColor: '#E5E5E5',\n  padding: 10,\n  cornerRadius: 6,\n  titleFont: { weight: '600', size: 12 },\n  bodyFont: { size: 12 },\n  displayColors: false,\n};\n\nnew Chart(document.getElementById('incomeChart'), {\n  type: 'bar',\n  data: {\n    labels: ['<€30K', '€30–60K', '€60–100K', '€100–200K', '€200K+'],\n    datasets: [{\n      data: [28, 36, 18, 12, 6],\n      backgroundColor: [NEUTRAL_300, EMERALD_LIGHT, EMERALD_MID, EMERALD, EMERALD_DEEP],\n      borderRadius: 4, borderSkipped: false, categoryPercentage: 0.7,\n    }]\n  },\n  options: {\n    responsive: true, maintainAspectRatio: false,\n    plugins: { legend: { display: false }, tooltip: { ...tooltipBase, callbacks: { label: c => c.raw + '% of fan base' } } },\n    scales: {\n      x: { grid: { display: false }, border: { color: '#D4D4D4' }, ticks: { font: { size: 11 }, color: '#525252' } },\n      y: { grid: { color: '#F5F5F5' }, border: { display: false }, ticks: { callback: v => v + '%', font: { size: 11 } }, max: 45 }\n    }\n  }\n});\n\nnew Chart(document.getElementById('industryChart'), {\n  type: 'bar',\n  data: {\n    labels: ['Financial', 'Public sector', 'Tech', 'Manufacturing', 'Consulting', 'Retail', 'Healthcare', 'Other'],\n    datasets: [{\n      data: [22, 18, 16, 12, 9, 8, 6, 9],\n      backgroundColor: [EMERALD_DEEP, EMERALD_DARK, EMERALD, EMERALD_MID, EMERALD_LIGHT, EMERALD_PALE, NEUTRAL_300, NEUTRAL_200],\n      borderRadius: 3, borderSkipped: false, categoryPercentage: 0.75,\n    }]\n  },\n  options: {\n    indexAxis: 'y',\n    responsive: true, maintainAspectRatio: false,\n    plugins: { legend: { display: false }, tooltip: { ...tooltipBase, callbacks: { label: c => c.raw + '% of fan base' } } },\n    scales: {\n      x: { grid: { color: '#F5F5F5' }, border: { display: false }, ticks: { callback: v => v + '%', font: { size: 11 } } },\n      y: { grid: { display: false }, border: { color: '#D4D4D4' }, ticks: { font: { size: 11 }, color: '#262626' } }\n    }\n  }\n});\n\nnew Chart(document.getElementById('ageChart'), {\n  type: 'bar',\n  data: {\n    labels: ['16–24', '25–34', '35–44', '45–54', '55–64', '65+'],\n    datasets: [{\n      data: [16, 26, 24, 18, 11, 5],\n      backgroundColor: [EMERALD_LIGHT, EMERALD, EMERALD_DEEP, EMERALD, EMERALD_LIGHT, NEUTRAL_300],\n      borderRadius: 4, borderSkipped: false, categoryPercentage: 0.72,\n    }]\n  },\n  options: {\n    responsive: true, maintainAspectRatio: false,\n    plugins: { legend: { display: false }, tooltip: { ...tooltipBase, callbacks: { label: c => c.raw + '% of fan base' } } },\n    scales: {\n      x: { grid: { display: false }, border: { color: '#D4D4D4' }, ticks: { font: { size: 11 }, color: '#525252' } },\n      y: { grid: { color: '#F5F5F5' }, border: { display: false }, ticks: { callback: v => v + '%', font: { size: 11 } }, max: 35 }\n    }\n  }\n});\n\nnew Chart(document.getElementById('sportChart'), {\n  type: 'bar',\n  data: {\n    labels: ['UEFA Champions Lge', 'UEFA Euros', 'Europa League', 'Conference League', 'Nations League', 'FIFA World Cup', 'Domestic top flight', 'Formula 1', 'Tennis (Slams)', 'NFL'],\n    datasets: [{\n      data: [88, 79, 64, 41, 52, 81, 92, 34, 22, 14],\n      backgroundColor: ctx => {\n        const v = ctx.raw;\n        if (v > 70) return EMERALD_DEEP;\n        if (v > 50) return EMERALD;\n        if (v > 30) return EMERALD_MID;\n        return EMERALD_LIGHT;\n      },\n      borderRadius: 3, borderSkipped: false, categoryPercentage: 0.78,\n    }]\n  },\n  options: {\n    indexAxis: 'y',\n    responsive: true, maintainAspectRatio: false,\n    plugins: { legend: { display: false }, tooltip: { ...tooltipBase, callbacks: { label: c => c.raw + '% follow' } } },\n    scales: {\n      x: { grid: { color: '#F5F5F5' }, border: { display: false }, ticks: { callback: v => v + '%', font: { size: 11 } } },\n      y: { grid: { display: false }, border: { color: '#D4D4D4' }, ticks: { font: { size: 11 }, color: '#262626' } }\n    }\n  }\n});\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
